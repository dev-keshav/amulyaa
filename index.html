<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>Amulyaa — Original Hand-Painted Art for Intentional Interiors</title>
    <meta name="description" content="Amulyaa is a Brooklyn-based studio creating original hand-painted works — expressive, tactile, gallery-ready paintings for homes and hospitality spaces worldwide." />
    <meta name="author" content="Amulyaa" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#2d1b0f" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Manrope:wght@300;400;500;600;700;800&display=swap"
    />

    <!-- Canonical (base — overridden per page by react-helmet-async) -->
    <link rel="canonical" href="https://www.amulyaa.com/" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Amulyaa" />
    <meta property="og:title" content="Amulyaa — Original Hand-Painted Art" />
    <meta property="og:description" content="Expressive, tactile, gallery-ready paintings for homes and hospitality spaces. Shipped worldwide." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.amulyaa.com/" />
    <meta property="og:image" content="https://www.amulyaa.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@amulyaaart" />
    <meta name="twitter:title" content="Amulyaa — Original Hand-Painted Art" />
    <meta name="twitter:description" content="Expressive, tactile, gallery-ready paintings for homes and hospitality spaces. Shipped worldwide." />
    <meta name="twitter:image" content="https://www.amulyaa.com/og-image.jpg" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Amulyaa",
      "url": "https://www.amulyaa.com",
      "logo": "https://www.amulyaa.com/logo.svg",
      "description": "Brooklyn-based studio creating original hand-painted works for intentional interiors.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Brooklyn",
        "addressCountry": "US"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "[EMAIL_ADDRESS]",
        "contactType": "customer service"
      },
      "sameAs": [
        "https://www.instagram.com/amulyaaart"
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
